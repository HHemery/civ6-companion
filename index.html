<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civ VI Companion — Mémo compétitif (BBG)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>Civ VI Companion</h1>
        <p class="subtitle">Mémo compétitif · BBG 7.4.6 · Online speed</p>
      </header>

      <div class="search-wrap">
        <input type="text" id="search" placeholder="Filtrer (civ, leader, guide)…" autocomplete="off">
      </div>
      <div class="me-wrap">
        <label for="me-select">👤 Je suis</label>
        <select id="me-select"></select>
      </div>

      <nav id="nav"><!-- généré par script.js --></nav>
    </aside>

    <div class="content-wrap">
      <main class="content" id="content"><!-- généré par script.js --></main>
    </div>

  </div>
  <!-- Données encyclopédie BBG (générées par tools/build-bbg-data.mjs, JS vanilla file://-compatible) -->
  <script src="data/bbg-leaders.js?v=2026-07-11-1"></script>
  <script src="data/bbg-flat.js?v=2026-07-11-1"></script>
  <script src="data/bbg-strategy.js?v=2026-07-11-1"></script>
  <script src="data/bbg-reference.js?v=2026-07-11-1"></script>
  <!-- Profils joueurs + civs main (éditable via le Backoffice, puis commité) -->
  <script src="data/profils.js?v=2026-07-11-1"></script>
  <script src="script.js?v=2026-07-11-6"></script>
</body>
</html>
